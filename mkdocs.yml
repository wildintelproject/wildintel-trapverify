site_name: CamTrap Verify — Documentation
site_description: User and developer documentation for CamTrap Verify
site_url: https://wildintelproject.github.io/wildintel-trapverify/
repo_url: https://github.com/wildintelproject/wildintel-trapverify
repo_name: wildintelproject/wildintel-trapverify
copyright: Copyright &copy; 2026 <a href="https://wildintel.eu/">WildINTEL</a>

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  logo: img/wildIntel_logo.webp
  favicon: img/wildIntel_logo.webp

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wildintelproject
      name: WildINTEL on GitHub
    - icon: fontawesome/solid/globe
      link: https://wildintel.eu/
      name: WildINTEL website

extra_css:
  - stylesheets/extras.css

markdown_extensions:
  - toc:
      title: On this page
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - tables
  - attr_list
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mike:
      version_selector: true

nav:
  - Home: index.md
  - User Manual: user-manual.md
  - Developer Manual: developer-manual.md
  - Features: features.md
  - About: about.md
