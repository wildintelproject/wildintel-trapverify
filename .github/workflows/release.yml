name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - development
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: false
        default: '0.0.0-dev'

jobs:
  build-linux:
    name: Linux packages (.deb / .rpm / .AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write version file
        run: echo '__version__ = "${{ steps.ver.outputs.version }}"' > backend/src/_version.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .deb and .rpm
        run: |
          mkdir -p dist
          docker build \
            --build-arg APP_VERSION=${{ steps.ver.outputs.version }} \
            --build-arg PKG_FORMAT=all \
            -f backend/Dockerfile.build \
            --output type=local,dest=dist/ \
            .

      - name: Build AppImage
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sudo apt-get install -y libfuse2
          wget -q -O appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

          mkdir -p AppDir
          cp -r dist/binary/. AppDir/camtrap-verify/

          printf '#!/bin/sh\nexec "$(dirname "$0")/camtrap-verify/camtrap-verify" "$@"\n' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

          printf '[Desktop Entry]\nType=Application\nName=CamTrap Verify\nExec=camtrap-verify\nIcon=camtrap-verify\nTerminal=false\nCategories=Science;\n' \
            > AppDir/camtrap-verify.desktop

          cp docs/img/WildINTEL_onlyCircle_25.png AppDir/camtrap-verify.png

          ARCH=x86_64 ./appimagetool AppDir/ \
            "dist/camtrap-verify-${VERSION}-linux-x86_64.AppImage"

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage

  build-windows:
    name: Windows packages (.exe portable + installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Frontend ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Backend (PyInstaller) ─────────────────────────────────────────────────
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen --group dev

      - name: Write version file
        shell: bash
        run: echo '__version__ = "${{ steps.ver.outputs.version }}"' > backend/src/_version.py

      - name: Build Windows executable
        working-directory: backend
        shell: bash
        run: |
          uv run pyinstaller src/app_entry.py \
            --onefile \
            --name camtrap-verify \
            --copy-metadata camtrap-verify \
            --add-data "src/camtrap_workflow.py;." \
            --add-data "src/settings.py;." \
            --add-data "../frontend/dist:static" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import anyio._backends._asyncio \
            --hidden-import pandas \
            --hidden-import httpx \
            --hidden-import platformdirs \
            --hidden-import pydantic_settings \
            --collect-submodules fastapi \
            --collect-submodules starlette

      # ── Stage artifacts ───────────────────────────────────────────────────────
      - name: Stage portable exe
        shell: bash
        run: |
          mkdir -p dist
          # Versioned copy for the release
          cp backend/dist/camtrap-verify.exe \
             dist/camtrap-verify-${{ steps.ver.outputs.version }}-windows-x64.exe
          # Unversioned copy referenced by the Inno Setup script
          cp backend/dist/camtrap-verify.exe \
             dist/camtrap-verify.exe

      # ── Inno Setup installer ──────────────────────────────────────────────────
      - name: Build installer
        shell: cmd
        run: >
          "%PROGRAMFILES(X86)%\Inno Setup 6\iscc.exe"
          /DMyAppVersion=${{ steps.ver.outputs.version }}
          installer\windows.iss

      - name: Remove staging exe
        shell: bash
        run: rm dist/camtrap-verify.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*.exe

  build-macos:
    name: macOS package (.dmg)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Frontend ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Backend (PyInstaller) ─────────────────────────────────────────────────
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen --group dev

      - name: Write version file
        run: echo '__version__ = "${{ steps.ver.outputs.version }}"' > backend/src/_version.py

      - name: Build macOS executable
        working-directory: backend
        run: |
          uv run pyinstaller src/app_entry.py \
            --onefile \
            --name camtrap-verify \
            --copy-metadata camtrap-verify \
            --add-data "src/camtrap_workflow.py:." \
            --add-data "src/settings.py:." \
            --add-data "../frontend/dist:static" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import anyio._backends._asyncio \
            --hidden-import pandas \
            --hidden-import httpx \
            --hidden-import platformdirs \
            --hidden-import pydantic_settings \
            --collect-submodules fastapi \
            --collect-submodules starlette

      # ── Stage artifacts ───────────────────────────────────────────────────────
      - name: Build DMG
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p dist dmg_staging
          cp backend/dist/camtrap-verify dmg_staging/camtrap-verify
          hdiutil create \
            -volname "CamTrap Verify ${VERSION}" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "dist/camtrap-verify-${VERSION}-macos-x86_64.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist/*.dmg

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/development'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^### \[${VERSION}\]/{found=1; next} found && /^### \[/{exit} found{print}" \
            CHANGELOG.md > release_notes.txt

      - name: Create stable release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release_notes.txt

      - name: Force-move dev tag
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/development'
        run: |
          git tag -f dev
          git push origin dev --force

      - name: Build dev release notes
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/development'
        run: |
          {
            echo "Development build — not for production use."
            echo "Built from commit \`${{ github.sha }}\` on branch \`${{ github.ref_name }}\`."
            echo ""
            echo "---"
            echo ""
            awk '/^## Upcoming release/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md
          } > dev_release_notes.txt

      - name: Create dev pre-release
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/development'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev build (${{ inputs.version || github.sha }})
          prerelease: true
          make_latest: false
          files: release-assets/*
          body_path: dev_release_notes.txt
