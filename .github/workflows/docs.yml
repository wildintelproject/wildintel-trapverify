name: Documentation

on:
  push:
    branches: [main, development]
    tags: ['v*']
    paths:
      - 'docs/**'
      - 'backend/docs/**'
      - 'mkdocs.yml'
      - 'backend/mkdocs.yml'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve version and alias
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "alias=latest"                  >> "$GITHUB_OUTPUT"
            echo "set_default=true"              >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" == "main" ]]; then
            echo "version=latest" >> "$GITHUB_OUTPUT"
            echo "alias="         >> "$GITHUB_OUTPUT"
            echo "set_default=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "alias="      >> "$GITHUB_OUTPUT"
            echo "set_default=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy main docs with mike
        run: |
          ALIAS="${{ steps.ver.outputs.alias }}"
          VERSION="${{ steps.ver.outputs.version }}"
          if [ -n "$ALIAS" ]; then
            uv run mike delete --push "$ALIAS" 2>/dev/null || true
            uv run mike deploy --push --update-aliases "$VERSION" "$ALIAS"
          else
            uv run mike deploy --push "$VERSION"
          fi

      - name: Set default version
        if: steps.ver.outputs.set_default == 'true'
        run: uv run mike set-default --push latest

      - name: Build API docs
        run: uv run mkdocs build --config-file backend/mkdocs.yml

      - name: Inject API docs into gh-pages
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ALIAS="${{ steps.ver.outputs.alias }}"

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages

          cp -r backend/site/. "/tmp/gh-pages/$VERSION/api/"
          if [ -n "$ALIAS" ]; then
            cp -r backend/site/. "/tmp/gh-pages/$ALIAS/api/"
          fi

          cd /tmp/gh-pages
          git add -A
          git diff --cached --quiet || git commit -m "docs: inject API reference into $VERSION"
          git push origin gh-pages
